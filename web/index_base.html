<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qwen3-TTS 语音克隆</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f1a;
        --card: #121826;
        --muted: #8a94a6;
        --text: #e5e9f2;
        --accent: #6ea8ff;
        --accent-2: #9a7bff;
        --border: #1f2635;
        --shadow: 0 20px 60px rgba(2, 6, 23, 0.5);
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        margin: 0;
        background: radial-gradient(1200px 600px at 20% -20%, #1c2340, transparent 60%),
                    radial-gradient(1000px 500px at 120% 0%, #2c1c40, transparent 50%),
                    var(--bg);
        color: var(--text);
      }
      .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px 56px; }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
      .brand { display: flex; align-items: center; gap: 12px; }
      .logo {
        width: 40px; height: 40px; border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 10px 30px rgba(110, 168, 255, 0.35);
      }
      .title { font-size: 22px; font-weight: 700; }
      .subtitle { color: var(--muted); font-size: 13px; }
      .card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: 16px; padding: 20px; box-shadow: var(--shadow);
      }
      .row { margin-bottom: 14px; }
      label { display: block; margin-bottom: 6px; font-weight: 600; color: #d6dbea; }
      .checkbox-row { display: flex; align-items: center; gap: 8px; font-weight: 500; margin-top: 6px; }
      .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; margin: 0; }
      input, select, textarea, button {
        width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
        background: #0f1422; color: var(--text); outline: none;
      }
      textarea { min-height: 110px; resize: vertical; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--accent); box-shadow: 0 0 0 2px rgba(110, 168, 255, 0.15);
      }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .status { margin-top: 12px; white-space: pre-wrap; color: #b8c1d6; }
      audio { margin-top: 14px; width: 100%; }
      .hint { color: var(--muted); font-size: 12px; }
      .actions { display: flex; gap: 12px; }
      .primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        border: none; color: #0b0f1a; font-weight: 700; cursor: pointer;
      }
      .secondary {
        background: transparent; border: 1px solid var(--border);
        color: var(--text); cursor: pointer;
      }
      .tag { padding: 4px 8px; border-radius: 999px; background: rgba(110, 168, 255, 0.16); color: #c7d7ff; font-size: 12px; }
      .footer { margin-top: 18px; color: var(--muted); font-size: 12px; }
      .modal {
        position: fixed; inset: 0; background: rgba(6, 9, 17, 0.7);
        display: none; align-items: center; justify-content: center; z-index: 50;
      }
      .modal.open { display: flex; }
      .modal-card {
        width: min(720px, 92vw); background: var(--card); border: 1px solid var(--border);
        border-radius: 16px; padding: 18px; box-shadow: var(--shadow);
      }
      .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .modal-body { max-height: 60vh; overflow: auto; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid var(--border); padding: 8px; text-align: left; }
      .icon-btn {
        background: transparent; border: 1px solid var(--border); color: var(--text);
        padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; width: auto;
      }
      .icon-btn:hover { background: rgba(110, 168, 255, 0.1); border-color: var(--accent); }
      td .icon-btn { padding: 4px 8px; }
      .subtitle-widget {
        margin-top: 12px;
        padding: 12px;
        background: #0b1020;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .subtitle-toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 10px;
      }
      .subtitle-scroll {
        max-height: 240px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0f1422;
        padding: 8px;
      }
      .subtitle-line {
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s ease, color 0.2s ease;
        margin-bottom: 6px;
      }
      .subtitle-line:last-child { margin-bottom: 0; }
      .subtitle-line:hover { background: rgba(110, 168, 255, 0.08); }
      .subtitle-line.active {
        background: rgba(110, 168, 255, 0.16);
        border: 1px solid rgba(110, 168, 255, 0.35);
      }
      .subtitle-time { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
      .subtitle-text { font-size: 13px; line-height: 1.55; }
      .subtitle-empty {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        padding: 16px 8px;
      }
      .subtitle-warning {
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 8px;
        background: rgba(255, 107, 107, 0.08);
        border: 1px solid rgba(255, 107, 107, 0.2);
        color: #ffb3b3;
        font-size: 12px;
      }
      @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } .actions { flex-direction: column; } }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <div class="title">Qwen3‑TTS 语音克隆</div>
            <div class="subtitle">语音克隆 · 任务管理</div>
          </div>
        </div>
        <div class="tag">Local API</div>
      </div>

      <div style="display:flex; gap:8px; margin-bottom:16px;">
        <button id="tabGenerate" class="primary" style="width:auto; padding:8px 16px;">🎙️ 提交任务</button>
        <button id="tabTasks" class="secondary" style="width:auto; padding:8px 16px;">📋 任务管理</button>
      </div>

      <!-- 提交任务页面 -->
      <div id="pageGenerate" class="card">
        <div class="grid">
          <div class="row">
            <label for="modelSize">模型大小</label>
            <select id="modelSize">
              <option value="1.7B">1.7B</option>
              <option value="0.6B">0.6B</option>
            </select>
          </div>
          <div class="row">
            <label for="userId">用户ID</label>
            <input id="userId" placeholder="例如：user001" value="user001" />
            <div class="hint">用于标识不同用户的任务</div>
          </div>
        </div>
        <div class="grid">
          <div class="row">
            <label for="taskId">任务ID（可选）</label>
            <input id="taskId" placeholder="不填则自动生成" />
            <div class="hint">留空自动生成9位短ID</div>
          </div>
          <div class="row">
            <label for="language">语言</label>
            <select id="language">
              <option value="Auto">自动识别</option>
              <option value="Chinese">中文</option>
              <option value="English">英文</option>
              <option value="Japanese">日文</option>
              <option value="Korean">韩文</option>
            </select>
          </div>
        </div>

        <div class="row">
          <label for="text">待合成文本</label>
          <textarea id="text" placeholder="请输入要合成的文本..."></textarea>
        </div>

        <div class="row">
          <label for="speed">语速</label>
          <input id="speed" type="range" min="0.1" max="2.0" step="0.05" value="1.0" />
          <div class="hint">当前值：<span id="speedValue">1.0</span></div>
          <label class="checkbox-row" style="margin-top:8px;">
            <input id="speedEnabled" type="checkbox" checked /> 启用语速调节
          </label>
        </div>

        <div class="row">
          <label for="refAudio">参考音频（wav/mp3/m4a 等）</label>
          <input id="refAudio" type="file" accept="audio/*" />
          <div class="hint">参考音频须 3–15 秒，上传后自动识别参考文本</div>
        </div>
        <div class="row">
          <label for="refText">参考文本</label>
          <textarea id="refText" placeholder="参考音频对应的文本内容（上传音频后自动识别）"></textarea>
        </div>

        <div class="actions">
          <button id="generate" class="primary">生成语音</button>
          <button id="clear" class="secondary">清空内容</button>
          <button id="viewTasks" class="secondary">查看我的任务</button>
        </div>

        <div class="status" id="status"></div>
        <audio id="audio" controls></audio>
        <div id="previewSubtitlePanel" style="display:none; margin-top:16px;"></div>

        <div id="taskInfo" style="display:none; margin-top:20px; padding:16px; background:#0f1422; border-radius:10px; border:1px solid var(--border);">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div style="font-weight:600; color:#d6dbea;">📋 任务追踪</div>
            <button id="refreshTask" class="icon-btn">🔄 刷新</button>
          </div>
          <div id="taskDetails"></div>
          <div style="margin-top:12px; padding:10px; background:rgba(110,168,255,0.1); border-radius:6px; border-left:3px solid var(--accent); font-size:12px; color:var(--muted);">
            💡 提示：任务将按提交顺序依次处理，页面会每3秒自动刷新状态
          </div>
        </div>
      </div>

      <!-- 任务管理页面 -->
      <div id="pageTasks" class="card" style="display:none;">
        <h2 style="margin-top:0;">任务管理中心</h2>
        <div class="row">
          <label for="taskMgrUserId">用户ID</label>
          <input id="taskMgrUserId" placeholder="输入用户ID查看任务" value="user001" />
        </div>
        <div class="actions">
          <button id="loadAllTasks" class="primary">加载我的任务</button>
          <button id="refreshAllTasks" class="secondary">刷新列表</button>
        </div>
        <div id="taskStats" style="display:none; margin:16px 0; padding:12px; background:#0f1422; border-radius:8px; border:1px solid var(--border);">
          <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px; font-size:13px;">
            <div><div style="color:var(--muted);">总任务数</div><div style="font-size:20px; font-weight:700; color:#74c0fc;" id="statTotal">0</div></div>
            <div><div style="color:var(--muted);">已完成</div><div style="font-size:20px; font-weight:700; color:#51cf66;" id="statCompleted">0</div></div>
            <div><div style="color:var(--muted);">处理中</div><div style="font-size:20px; font-weight:700; color:#74c0fc;" id="statProcessing">0</div></div>
            <div><div style="color:var(--muted);">等待中</div><div style="font-size:20px; font-weight:700; color:#ffa94d;" id="statPending">0</div></div>
            <div><div style="color:var(--muted);">失败</div><div style="font-size:20px; font-weight:700; color:#ff6b6b;" id="statFailed">0</div></div>
          </div>
        </div>
        <div id="allTasksList" style="margin-top:20px;"></div>
        <div id="taskDetailPanel" style="display:none; margin-top:20px; padding:16px; background:#0f1422; border-radius:10px; border:1px solid var(--border);">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div style="font-weight:600; color:#d6dbea;">任务详情</div>
            <button id="closeTaskDetail" class="icon-btn">关闭</button>
          </div>
          <div id="taskDetailContent"></div>
        </div>
      </div>

      <div class="footer">提示：生成时间与模型大小、文本长度相关。</div>
    </div>

    <div id="tasksModal" class="modal">
      <div class="modal-card">
        <div class="modal-header">
          <div>
            <div style="font-weight:700;">我的任务列表</div>
            <div style="font-size:12px;color:var(--muted);margin-top:4px;">用户: <span id="modalUserId"></span></div>
          </div>
          <button id="closeTasks" class="icon-btn">关闭</button>
        </div>
        <div class="modal-body"><div id="tasksList" style="min-height:200px;"></div></div>
        <div style="margin-top:12px;display:flex;gap:10px;">
          <button id="refreshTasks" class="secondary">刷新列表</button>
          <button id="clearAllTasks" class="secondary" style="color:#f87171;border-color:#f87171;">一键清除所有任务</button>
        </div>
      </div>
    </div>

    <div id="previewModal" class="modal">
      <div class="modal-card" style="width:min(860px, 94vw);">
        <div class="modal-header">
          <div>
            <div style="font-weight:700;">任务试听</div>
            <div id="previewModalMeta" style="font-size:12px;color:var(--muted);margin-top:4px;"></div>
          </div>
          <button id="closePreviewModal" class="icon-btn">关闭</button>
        </div>
        <div class="modal-body">
          <div id="previewModalContent"></div>
        </div>
      </div>
    </div>

    <script>
      const modelSize = document.getElementById("modelSize");
      const status = document.getElementById("status");
      const audio = document.getElementById("audio");
      const speed = document.getElementById("speed");
      const speedValue = document.getElementById("speedValue");
      const speedEnabled = document.getElementById("speedEnabled");

      let currentTaskId = null;
      let currentUserId = null;
      let taskCheckInterval = null;

      const tabGenerate = document.getElementById("tabGenerate");
      const tabTasks = document.getElementById("tabTasks");
      const pageGenerate = document.getElementById("pageGenerate");
      const pageTasks = document.getElementById("pageTasks");
      const previewSubtitlePanel = document.getElementById("previewSubtitlePanel");
      const previewModal = document.getElementById("previewModal");
      const previewModalMeta = document.getElementById("previewModalMeta");
      const previewModalContent = document.getElementById("previewModalContent");
      let subtitleViewSeq = 0;
      const subtitleBindings = new Map();

      function fullUrl(url) {
        return url && (url.startsWith("http") ? url : (window.location.origin + url));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function createMountId(prefix = "subtitle") {
        subtitleViewSeq += 1;
        return `${prefix}-${subtitleViewSeq}`;
      }

      function cleanupSubtitleBinding(audioElementId) {
        const binding = subtitleBindings.get(audioElementId);
        if (!binding) return;
        binding.listeners.forEach(([eventName, handler]) => binding.audioEl.removeEventListener(eventName, handler));
        subtitleBindings.delete(audioElementId);
      }

      function clearPreviewSubtitle() {
        cleanupSubtitleBinding("audio");
        previewSubtitlePanel.style.display = "none";
        previewSubtitlePanel.innerHTML = "";
      }

      function closeTaskPreviewModal() {
        cleanupSubtitleBinding("previewModalAudio");
        previewModal.classList.remove("open");
        previewModalMeta.textContent = "";
        previewModalContent.innerHTML = "";
      }

      function normalizeSubtitleSegments(subtitleJsonData) {
        return (subtitleJsonData?.segments || [])
          .map((seg) => ({
            start: Number(seg.start || 0),
            end: Number(seg.end || 0),
            text: String(seg.text || "").trim(),
          }))
          .filter((seg) => seg.text);
      }

      function formatSubtitleTime(seconds) {
        const safe = Math.max(0, Number(seconds || 0));
        const hours = Math.floor(safe / 3600);
        const minutes = Math.floor((safe % 3600) / 60);
        const secs = Math.floor(safe % 60);
        const millis = Math.round((safe - Math.floor(safe)) * 1000);
        return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}.${String(millis).padStart(3, "0")}`;
      }

      function buildSubtitleWidgetMarkup(mountId, options = {}) {
        const buttons = [];
        if (options.audioDownloadUrl) buttons.push(`<a href="${options.audioDownloadUrl}" download="${options.audioDownloadName || "audio.wav"}" class="icon-btn">下载音频</a>`);
        if (options.subtitleSrtUrl) buttons.push(`<a href="${options.subtitleSrtUrl}" download="${options.subtitleSrtName || "subtitle.srt"}" class="icon-btn">下载 SRT</a>`);
        if (options.subtitleJsonUrl) buttons.push(`<a href="${options.subtitleJsonUrl}" download="${options.subtitleJsonName || "subtitle.json"}" class="icon-btn">下载 JSON</a>`);
        return `
          <div class="subtitle-widget">
            <div style="font-weight:600; margin-bottom:8px;">字幕</div>
            ${options.subtitleError ? `<div class="subtitle-warning">${escapeHtml(options.subtitleError)}</div>` : ""}
            <div class="subtitle-toolbar">${buttons.join("") || '<span class="hint">暂无可下载文件</span>'}</div>
            <div class="subtitle-scroll" id="${mountId}-scroll">
              <div class="subtitle-empty" id="${mountId}-empty">字幕加载中...</div>
              <div id="${mountId}-list"></div>
            </div>
          </div>
        `;
      }

      async function mountSubtitleWidget({ mountId, audioElementId, subtitleJsonUrl = null }) {
        const audioEl = document.getElementById(audioElementId);
        const listEl = document.getElementById(`${mountId}-list`);
        const emptyEl = document.getElementById(`${mountId}-empty`);
        if (!audioEl || !listEl || !emptyEl || !subtitleJsonUrl) {
          if (emptyEl) emptyEl.textContent = "暂无可用字幕";
          return;
        }

        cleanupSubtitleBinding(audioElementId);

        let payload;
        try {
          const resp = await fetch(fullUrl(subtitleJsonUrl));
          payload = await resp.json();
          if (!resp.ok) throw new Error(payload.detail || "字幕加载失败");
        } catch (err) {
          emptyEl.textContent = "字幕加载失败：" + String(err);
          return;
        }

        const segments = normalizeSubtitleSegments(payload);
        if (!segments.length) {
          emptyEl.textContent = "暂无可用字幕";
          return;
        }

        emptyEl.style.display = "none";
        listEl.innerHTML = segments.map((seg, index) => `
          <div class="subtitle-line" data-index="${index}" data-start="${seg.start}" data-end="${seg.end}">
            <div class="subtitle-time">${formatSubtitleTime(seg.start)} - ${formatSubtitleTime(seg.end)}</div>
            <div class="subtitle-text">${escapeHtml(seg.text)}</div>
          </div>
        `).join("");

        const items = Array.from(listEl.querySelectorAll(".subtitle-line"));
        let activeIndex = -1;

        const syncActiveSubtitle = () => {
          const currentTime = audioEl.currentTime || 0;
          let nextIndex = -1;
          for (let i = 0; i < items.length; i += 1) {
            const start = Number(items[i].dataset.start);
            const end = Number(items[i].dataset.end);
            if (currentTime >= start && currentTime <= end + 0.08) {
              nextIndex = i;
              break;
            }
          }
          if (activeIndex === nextIndex) return;
          items.forEach((item) => item.classList.remove("active"));
          activeIndex = nextIndex;
          if (activeIndex >= 0) {
            items[activeIndex].classList.add("active");
            items[activeIndex].scrollIntoView({ block: "nearest", behavior: "smooth" });
          }
        };

        const clearActiveSubtitle = () => {
          items.forEach((item) => item.classList.remove("active"));
          activeIndex = -1;
        };

        items.forEach((item) => {
          item.addEventListener("click", () => {
            audioEl.currentTime = Number(item.dataset.start || 0);
            audioEl.play();
          });
        });

        const listeners = [
          ["timeupdate", syncActiveSubtitle],
          ["seeked", syncActiveSubtitle],
          ["loadedmetadata", syncActiveSubtitle],
          ["ended", clearActiveSubtitle],
        ];
        listeners.forEach(([eventName, handler]) => audioEl.addEventListener(eventName, handler));
        subtitleBindings.set(audioElementId, { audioEl, listeners });
        syncActiveSubtitle();
      }

      function renderPreviewSubtitle(task) {
        if (!task || task.status !== "completed" || !task.audio_url) {
          clearPreviewSubtitle();
          return;
        }
        const mountId = createMountId("preview-subtitle");
        previewSubtitlePanel.innerHTML = buildSubtitleWidgetMarkup(mountId, {
          audioDownloadUrl: fullUrl(task.audio_url),
          audioDownloadName: `${task.task_id || "audio"}.wav`,
          subtitleSrtUrl: task.subtitle_srt ? fullUrl(task.subtitle_srt) : "",
          subtitleSrtName: `${task.task_id || "audio"}.srt`,
          subtitleJsonUrl: task.subtitle_json ? fullUrl(task.subtitle_json) : "",
          subtitleJsonName: `${task.task_id || "audio"}_subtitle.json`,
          subtitleError: task.subtitle_error || "",
        });
        previewSubtitlePanel.style.display = "block";
        mountSubtitleWidget({
          mountId,
          audioElementId: "audio",
          subtitleJsonUrl: task.subtitle_json || null,
        });
      }

      tabGenerate.addEventListener("click", () => {
        tabGenerate.classList.add("primary"); tabGenerate.classList.remove("secondary");
        tabTasks.classList.add("secondary"); tabTasks.classList.remove("primary");
        pageGenerate.style.display = "block"; pageTasks.style.display = "none";
      });
      tabTasks.addEventListener("click", () => {
        tabTasks.classList.add("primary"); tabTasks.classList.remove("secondary");
        tabGenerate.classList.add("secondary"); tabGenerate.classList.remove("primary");
        pageGenerate.style.display = "none"; pageTasks.style.display = "block";
        const userId = document.getElementById("taskMgrUserId").value.trim();
        if (userId) loadAllUserTasks(userId);
      });

      function clearTaskCheck() {
        if (taskCheckInterval) { clearInterval(taskCheckInterval); taskCheckInterval = null; }
      }

      document.getElementById("refAudio").addEventListener("change", async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const prevStatus = status.textContent;
        status.textContent = "🔄 WhisperX 识别参考文本中...";
        try {
          const resp = await fetch("/api/asr/status");
          const st = await resp.json();
          if (!st.available) {
            status.textContent = "⚠️ WhisperX 未安装，请手动输入参考文本。安装: pip install whisperx";
            return;
          }
          const formData = new FormData();
          formData.append("file", file);
          const asrResp = await fetch("/api/asr", {
            method: "POST",
            body: formData,
          });
          const data = await asrResp.json();
          if (!asrResp.ok) {
            status.textContent = "❌ 识别失败：" + (data.detail || "未知错误");
            return;
          }
          const text = (data.text || "").trim();
          document.getElementById("refText").value = text;
          status.textContent = text ? "✅ 参考文本已自动识别" : (prevStatus || "");
        } catch (err) {
          status.textContent = "❌ 识别请求失败：" + String(err);
        }
      });

      speed.addEventListener("input", () => { speedValue.textContent = Number(speed.value).toFixed(2); });
      speedEnabled.addEventListener("change", () => { speed.disabled = !speedEnabled.checked; });
      speed.disabled = !speedEnabled.checked;

      document.getElementById("clear").addEventListener("click", () => {
        document.getElementById("text").value = "";
        document.getElementById("refText").value = "";
        document.getElementById("refAudio").value = "";
        document.getElementById("taskId").value = "";
        status.textContent = "";
        audio.removeAttribute("src");
        clearPreviewSubtitle();
        clearTaskCheck();
        document.getElementById("taskInfo").style.display = "none";
      });

      document.getElementById("generate").addEventListener("click", async () => {
        status.textContent = "提交中...";
        audio.removeAttribute("src");
        clearPreviewSubtitle();
        clearTaskCheck();
        document.getElementById("taskInfo").style.display = "none";

        const refAudio = document.getElementById("refAudio").files[0];
        if (!refAudio) { status.textContent = "请选择参考音频文件"; return; }
        const refText = document.getElementById("refText").value.trim();
        if (!refText) { status.textContent = "请输入参考文本"; return; }
        const text = document.getElementById("text").value.replace(/[\r\n]+/g, ' ').replace(/\s{2,}/g, ' ').trim();
        if (!text) { status.textContent = "请输入要合成的文本"; return; }
        
        const userId = document.getElementById("userId").value.trim();
        if (!userId) { status.textContent = "请输入用户ID"; return; }
        
        // 使用新的文件上传接口（无需转base64）
        const formData = new FormData();
        formData.append('user_id', userId);
        formData.append('text', text);
        formData.append('ref_text', refText);
        formData.append('ref_audio', refAudio); // 直接上传文件
        formData.append('speed', speed.value);
        formData.append('lang', document.getElementById("language").value || "English");
        formData.append('model', modelSize.value);
        
        const taskId = document.getElementById("taskId").value.trim();
        if (taskId) {
          formData.append('task_id', taskId);
        }

        try {
          status.textContent = "📤 提交任务到队列...";
          const resp = await fetch("/api/clone/upload", {
            method: "POST",
            body: formData, // 直接发送表单数据
          });
          const data = await resp.json();
          if (!resp.ok) {
            status.textContent = "❌ 提交失败：" + (data.detail || "未知错误");
            return;
          }
          
          // 保存任务信息
          currentTaskId = data.task_id;
          currentUserId = data.user_id;
          
          // 显示任务信息区域
          document.getElementById("taskInfo").style.display = "block";
          
          // 显示初始任务状态
          const queuePos = data.queue_position || 0;
          status.textContent = `✅ 任务已提交！\n任务ID: ${data.task_id}\n队列位置: ${queuePos}\n\n等待处理中...`;
          
          updateTaskDisplay({
            task_id: data.task_id,
            user_id: data.user_id,
            status: data.status,
            created_at: data.created_at || new Date().toISOString(),
          });
          
          // 启动轮询检查任务状态（每3秒）
          taskCheckInterval = setInterval(checkTaskStatus, 3000);
          
        } catch (err) {
          status.textContent = "❌ 请求失败：" + String(err);
        }
      });

      async function checkTaskStatus() {
        if (!currentTaskId || !currentUserId) return;
        try {
          const resp = await fetch(`/api/task/${currentUserId}/${currentTaskId}`);
          const task = await resp.json();
          if (!resp.ok) {
            updateTaskDisplay(null, "❌ 查询失败：" + (task.detail || "未知错误"));
            clearTaskCheck();
            return;
          }
          updateTaskDisplay(task);
          
          // 更新状态文本
          if (task.status === "pending") {
            status.textContent = `⏳ 任务排队中...\n任务ID: ${task.task_id}`;
          } else if (task.status === "processing") {
            status.textContent = `🔄 正在生成语音...\n任务ID: ${task.task_id}`;
          } else if (task.status === "completed") {
            clearTaskCheck();
            status.textContent = `✅ 任务完成！\n任务ID: ${task.task_id}\n\n👇 请在下方试听和下载`;
            audio.src = fullUrl(task.audio_url);
            renderPreviewSubtitle(task);
          } else if (task.status === "failed") {
            clearTaskCheck();
            clearPreviewSubtitle();
            status.textContent = `❌ 任务失败\n任务ID: ${task.task_id}\n错误: ${task.error || "未知错误"}`;
          }
        } catch (err) {
          updateTaskDisplay(null, "❌ 查询失败：" + String(err));
        }
      }

      function updateTaskDisplay(task, errorMsg) {
        const taskDetails = document.getElementById("taskDetails");
        if (errorMsg) { taskDetails.innerHTML = `<div style="color:#ff6b6b;">${errorMsg}</div>`; return; }
        if (!task) return;
        const statusColor = { 'pending': '#ffa94d', 'processing': '#74c0fc', 'completed': '#51cf66', 'failed': '#ff6b6b' }[task.status] || '#8a94a6';
        const statusText = { 'pending': '⏳ 等待处理', 'processing': '🔄 处理中', 'completed': '✅ 已完成', 'failed': '❌ 失败' }[task.status] || task.status;
        let html = `
          <div style="display:grid; gap:8px; font-size:13px;">
            <div><span style="color:var(--muted);">任务ID:</span> <code style="background:#1f2635;padding:2px 6px;border-radius:4px;">${task.task_id}</code></div>
            <div><span style="color:var(--muted);">状态:</span> <span style="color:${statusColor};font-weight:600;">${statusText}</span></div>
            <div><span style="color:var(--muted);">创建时间:</span> ${task.created_at || 'N/A'}</div>
        `;
        if (task.started_at) html += `<div><span style="color:var(--muted);">开始时间:</span> ${task.started_at}</div>`;
        if (task.completed_at) html += `<div><span style="color:var(--muted);">完成时间:</span> ${task.completed_at}</div>`;
        let subtitleMountId = null;
        if (task.status === 'completed' && task.audio_url) {
          const audioUrl = fullUrl(task.audio_url);
          const subtitleSrtUrl = task.subtitle_srt ? fullUrl(task.subtitle_srt) : '';
          const subtitleJsonUrl = task.subtitle_json ? fullUrl(task.subtitle_json) : '';
          subtitleMountId = createMountId("task-info-subtitle");
          html += `
            <div style="margin-top:8px; padding-top:8px; border-top:1px solid var(--border);">
              <div style="font-weight:600; margin-bottom:6px;">🎧 试听</div>
              <audio id="${subtitleMountId}-audio" controls src="${audioUrl}" style="width:100%; margin-bottom:10px;"></audio>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <a href="${audioUrl}" download style="display:inline-block; padding:8px 16px; background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#0b0f1a; text-decoration:none; border-radius:8px; font-weight:600;">🎵 下载</a>
                ${subtitleSrtUrl ? `<a href="${subtitleSrtUrl}" download class="icon-btn">下载 SRT</a>` : ''}
                ${subtitleJsonUrl ? `<a href="${subtitleJsonUrl}" download class="icon-btn">下载 JSON</a>` : ''}
                <button type="button" class="icon-btn" onclick="deleteTaskThenRefresh('${task.user_id}','${task.task_id}','taskInfo')">删除</button>
                <button type="button" class="icon-btn" onclick="retryTaskThenRefresh('${task.user_id}','${task.task_id}')">重试</button>
              </div>
              ${buildSubtitleWidgetMarkup(subtitleMountId, {
                subtitleSrtUrl,
                subtitleSrtName: `${task.task_id}.srt`,
                subtitleJsonUrl,
                subtitleJsonName: `${task.task_id}_subtitle.json`,
                subtitleError: task.subtitle_error || "",
              })}
            </div>
          `;
        }
        if (task.error) html += `<div style="color:#ff6b6b; margin-top:8px;">错误: ${task.error}</div>`;
        if (task.status === 'failed' && task.user_id && task.task_id) {
          html += `<div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:flex; gap:8px;">
            <button type="button" class="icon-btn" onclick="deleteTaskThenRefresh('${task.user_id}','${task.task_id}','taskInfo')">删除任务</button>
            <button type="button" class="icon-btn" onclick="retryTaskThenRefresh('${task.user_id}','${task.task_id}')">重试</button>
          </div>`;
        }
        html += '</div>';
        taskDetails.innerHTML = html;
        if (subtitleMountId) {
          mountSubtitleWidget({
            mountId: subtitleMountId,
            audioElementId: `${subtitleMountId}-audio`,
            subtitleJsonUrl: task.subtitle_json || null,
          });
        }
      }

      async function deleteTaskThenRefresh(userId, taskId, fromPage) {
        if (!confirm('确定删除该任务吗？')) return;
        try {
          const resp = await fetch(`/api/task/${userId}/${taskId}`, { method: 'DELETE' });
          const data = await resp.json();
          if (resp.ok) {
            if (fromPage === 'taskInfo') {
              document.getElementById('taskInfo').style.display = 'none';
              currentTaskId = null; currentUserId = null;
              clearTaskCheck();
            }
            if (fromPage === 'tasksModal') await loadUserTasks(document.getElementById('modalUserId').textContent);
            if (fromPage === 'pageTasks') {
              await loadAllUserTasks(document.getElementById('taskMgrUserId').value.trim());
              document.getElementById('taskDetailPanel').style.display = 'none';
            }
            status.textContent = '已删除任务';
          } else alert('删除失败: ' + (data.detail || '未知错误'));
        } catch (e) { alert('删除失败: ' + String(e)); }
      }

      async function retryTaskThenRefresh(userId, taskId) {
        try {
          const resp = await fetch(`/api/task/${userId}/${taskId}/retry`, { method: 'POST' });
          const data = await resp.json();
          if (resp.ok) {
            const onTaskPage = document.getElementById('taskDetailPanel').style.display !== 'none';
            if (onTaskPage) {
              document.getElementById('taskDetailPanel').style.display = 'none';
              await loadAllUserTasks(document.getElementById('taskMgrUserId').value.trim());
              alert('已重新提交，新任务ID: ' + data.task_id + '\n任务列表已刷新。');
            } else {
              currentTaskId = data.task_id; currentUserId = data.user_id;
              status.textContent = '已重新提交，新任务ID: ' + data.task_id;
              document.getElementById('taskInfo').style.display = 'block';
              updateTaskDisplay({ task_id: data.task_id, user_id: data.user_id, status: 'pending', created_at: new Date().toISOString() });
              taskCheckInterval = setInterval(checkTaskStatus, 3000);
            }
          } else alert('重试失败: ' + (data.detail || '未知错误'));
        } catch (e) { alert('重试失败: ' + String(e)); }
      }

      document.getElementById("refreshTask").addEventListener("click", () => checkTaskStatus());

      document.getElementById("viewTasks").addEventListener("click", async () => {
        const userId = document.getElementById("userId").value.trim();
        if (!userId) { alert("请先输入用户ID"); return; }
        document.getElementById("modalUserId").textContent = userId;
        document.getElementById("tasksModal").classList.add("open");
        await loadUserTasks(userId);
      });
      document.getElementById("closeTasks").addEventListener("click", () => document.getElementById("tasksModal").classList.remove("open"));
      document.getElementById("closePreviewModal").addEventListener("click", closeTaskPreviewModal);
      document.getElementById("refreshTasks").addEventListener("click", async () => {
        await loadUserTasks(document.getElementById("modalUserId").textContent);
      });

      document.getElementById("clearAllTasks").addEventListener("click", async () => {
        if (!confirm("确认清除所有任务？正在执行中的任务不会被删除。")) return;
        const btn = document.getElementById("clearAllTasks");
        btn.disabled = true;
        btn.textContent = "清除中...";
        try {
          const resp = await fetch("/api/tasks/clear", { method: "DELETE" });
          const data = await resp.json();
          if (!resp.ok) { alert("清除失败: " + (data.detail || "未知错误")); return; }
          alert(`已清除 ${data.deleted} 个任务${data.skipped_processing > 0 ? "，保留 " + data.skipped_processing + " 个执行中的任务" : ""}`);
          await loadUserTasks(document.getElementById("modalUserId").textContent);
        } catch (e) {
          alert("清除失败: " + e.message);
        } finally {
          btn.disabled = false;
          btn.textContent = "一键清除所有任务";
        }

      async function openTaskPreview(userId, taskId) {
        previewModal.classList.add("open");
        previewModalMeta.textContent = `任务ID: ${taskId}`;
        previewModalContent.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">加载中...</div>';

        try {

          const task = await resp.json();

            previewModalContent.innerHTML = `<div style="color:#ff6b6b;">该任务尚未完成，当前状态：${escapeHtml(task.status || "unknown")}</div>`;
            return;

                ${subtitleJsonUrl ? `<a href="${subtitleJsonUrl}" download class="icon-btn">下载 JSON</a>` : ''}
              </div>
              ${buildSubtitleWidgetMarkup(mountId, {
                subtitleSrtUrl,
                subtitleSrtName: `${task.task_id}.srt`,
                subtitleJsonUrl,
                subtitleJsonName: `${task.task_id}_subtitle.json`,
                subtitleError: task.subtitle_error || "",

          previewModalContent.innerHTML = `<div style="color:#ff6b6b;">加载失败: ${String(err)}</div>`;

      async function loadUserTasks(userId) {
        const tasksList = document.getElementById("tasksList");
        tasksList.innerHTML = '<div style="text-align:center;color:var(--muted);">加载中...</div>';
        try {
          const resp = await fetch(`/api/tasks/${userId}`);
          const data = await resp.json();
          if (!resp.ok) {
            tasksList.innerHTML = `<div style="color:#ff6b6b;">加载失败: ${data.detail || '未知错误'}</div>`;
            return;
          }
          if (data.total === 0) {
            tasksList.innerHTML = '<div style="text-align:center;color:var(--muted);">暂无任务</div>';
            return;
          }
          let html = '<table style="width:100%;"><thead><tr><th>任务ID</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead><tbody>';
          data.tasks.forEach(task => {
            const statusColor = { 'pending': '#ffa94d', 'processing': '#74c0fc', 'completed': '#51cf66', 'failed': '#ff6b6b' }[task.status] || '#8a94a6';
            const audioLink = task.status === 'completed' && task.audio_url ? fullUrl(task.audio_url) : '';
            const srtLink = task.status === 'completed' && task.subtitle_srt ? fullUrl(task.subtitle_srt) : '';
            const jsonLink = task.status === 'completed' && task.subtitle_json ? fullUrl(task.subtitle_json) : '';
            let actions = '';
            if (task.status === 'completed' && audioLink) {
              actions = `<button type="button" class="icon-btn" onclick="openTaskPreview('${task.user_id}','${task.task_id}')">试听</button> <a href="${audioLink}" class="icon-btn" download>下载</a> `;
              if (srtLink) actions += `<a href="${srtLink}" class="icon-btn" download>SRT</a> `;
              if (jsonLink) actions += `<a href="${jsonLink}" class="icon-btn" download>JSON</a> `;
            }
            if (task.status === 'failed' || task.status === 'completed') {
              actions += `<button type="button" class="icon-btn" onclick="deleteTaskThenRefresh('${task.user_id}','${task.task_id}','tasksModal')">删除</button> <button type="button" class="icon-btn" onclick="retryTaskThenRefresh('${task.user_id}','${task.task_id}')">重试</button>`;
            }
            if (!actions) actions = '<span style="color:var(--muted);font-size:11px;">-</span>';
            html += `<tr><td><code style="font-size:11px;">${task.task_id}</code></td><td><span style="color:${statusColor};">${task.status}</span></td><td style="font-size:12px;">${new Date(task.created_at).toLocaleString()}</td><td style="white-space:nowrap;">${actions}</td></tr>`;
          });
          html += '</tbody></table>';
          tasksList.innerHTML = html;
        } catch (err) {
          tasksList.innerHTML = `<div style="color:#ff6b6b;">加载失败: ${String(err)}</div>`;
        }
      }

      document.getElementById("refreshAllTasks").addEventListener("click", async () => {

        if (userId) await loadAllUserTasks(userId);
      });
      document.getElementById("closeTaskDetail").addEventListener("click", () => {

      });

      async function loadAllUserTasks(userId) {
        const tasksList = document.getElementById("allTasksList");
        const taskStats = document.getElementById("taskStats");
        tasksList.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">加载中...</div>';
        taskStats.style.display = "none";
        try {
          const resp = await fetch(`/api/tasks/${userId}`);
          const data = await resp.json();
          if (!resp.ok) {
            tasksList.innerHTML = `<div style="color:#ff6b6b;padding:20px;">加载失败: ${data.detail || '未知错误'}</div>`;
            return;
          }
          if (data.total === 0) {
            tasksList.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">暂无任务<br><br>在「提交任务」页面创建第一个任务</div>';
            return;
          }
          const stats = { total: data.total, completed: 0, processing: 0, pending: 0, failed: 0 };
          data.tasks.forEach(task => {
            if (task.status === 'completed') stats.completed++;
            else if (task.status === 'processing') stats.processing++;
            else if (task.status === 'pending') stats.pending++;
            else if (task.status === 'failed') stats.failed++;
          });
          document.getElementById("statTotal").textContent = stats.total;
          document.getElementById("statCompleted").textContent = stats.completed;
          document.getElementById("statProcessing").textContent = stats.processing;
          document.getElementById("statPending").textContent = stats.pending;
          document.getElementById("statFailed").textContent = stats.failed;
          taskStats.style.display = "block";

          let html = '<div style="overflow-x:auto;"><table style="width:100%;"><thead><tr><th style="width:120px;">任务ID</th><th style="width:90px;">状态</th><th>合成文本</th><th style="width:150px;">创建时间</th><th style="width:120px;">操作</th></tr></thead><tbody>';
          data.tasks.forEach(task => {
            const statusColor = { 'pending': '#ffa94d', 'processing': '#74c0fc', 'completed': '#51cf66', 'failed': '#ff6b6b' }[task.status] || '#8a94a6';
            const statusText = { 'pending': '⏳ 等待', 'processing': '🔄 处理中', 'completed': '✅ 完成', 'failed': '❌ 失败' }[task.status] || task.status;
            const text = task.params?.text || 'N/A';
            const shortText = text.length > 30 ? text.substring(0, 30) + '...' : text;
            const audioLink = task.status === 'completed' && task.audio_url ? fullUrl(task.audio_url) : '';
            const srtLink = task.status === 'completed' && task.subtitle_srt ? fullUrl(task.subtitle_srt) : '';
            const jsonLink = task.status === 'completed' && task.subtitle_json ? fullUrl(task.subtitle_json) : '';
            let actions = '';
            if (task.status === 'completed' && audioLink) {
              actions = `<button type="button" class="icon-btn" onclick="event.stopPropagation(); openTaskPreview('${task.user_id}','${task.task_id}')">试听</button> <a href="${audioLink}" class="icon-btn" download onclick="event.stopPropagation();">下载</a> `;
              if (srtLink) actions += `<a href="${srtLink}" class="icon-btn" download onclick="event.stopPropagation();">SRT</a> `;
              if (jsonLink) actions += `<a href="${jsonLink}" class="icon-btn" download onclick="event.stopPropagation();">JSON</a> `;
            }
            else if (task.status === 'processing' || task.status === 'pending') actions = '<span style="color:var(--muted);font-size:11px;">处理中</span>';
            if (task.status === 'failed' || task.status === 'completed') {
              actions += `<button type="button" class="icon-btn" onclick="event.stopPropagation(); deleteTaskThenRefresh('${userId}','${task.task_id}','pageTasks')">删除</button> <button type="button" class="icon-btn" onclick="event.stopPropagation(); retryTaskThenRefresh('${task.user_id}','${task.task_id}')">重试</button>`;
            }
            if (!actions) actions = '<span style="color:var(--muted);font-size:11px;">-</span>';
            html += `<tr style="cursor:pointer;" onclick="showTaskDetail('${userId}', '${task.task_id}')"><td><code style="font-size:11px;">${task.task_id}</code></td><td><span style="color:${statusColor};font-weight:600;font-size:12px;">${statusText}</span></td><td style="font-size:12px;">${shortText}</td><td style="font-size:11px;color:var(--muted);">${new Date(task.created_at).toLocaleString()}</td><td style="white-space:nowrap;">${actions}</td></tr>`;
          });
          html += '</tbody></table></div>';
          tasksList.innerHTML = html;
        } catch (err) {
          tasksList.innerHTML = `<div style="color:#ff6b6b;padding:20px;">加载失败: ${String(err)}</div>`;
        }
      }

      async function showTaskDetail(userId, taskId) {

        detailPanel.style.display = "block";
        detailContent.innerHTML = '<div style="text-align:center;color:var(--muted);">加载中...</div>';

          }
          const statusColor = { 'pending': '#ffa94d', 'processing': '#74c0fc', 'completed': '#51cf66', 'failed': '#ff6b6b' }[task.status] || '#8a94a6';
          const statusText = { 'pending': '⏳ 等待处理', 'processing': '🔄 处理中', 'completed': '✅ 已完成', 'failed': '❌ 失败' }[task.status] || task.status;
          let html = '<div style="display:grid; gap:12px; font-size:13px;">';
          html += `<div style="display:grid; grid-template-columns:120px 1fr; gap:8px;"><span style="color:var(--muted);">任务ID:</span><code style="background:#1f2635;padding:4px 8px;border-radius:4px;">${task.task_id}</code></div>`;
          html += `<div style="display:grid; grid-template-columns:120px 1fr; gap:8px;"><span style="color:var(--muted);">用户ID:</span><span>${task.user_id}</span></div>`;
          html += `<div style="display:grid; grid-template-columns:120px 1fr; gap:8px;"><span style="color:var(--muted);">状态:</span><span style="color:${statusColor};font-weight:600;">${statusText}</span></div>`;
          html += `<div style="display:grid; grid-template-columns:120px 1fr; gap:8px;"><span style="color:var(--muted);">创建时间:</span><span>${new Date(task.created_at).toLocaleString()}</span></div>`;
          if (task.started_at) html += `<div style="display:grid; grid-template-columns:120px 1fr; gap:8px;"><span style="color:var(--muted);">开始时间:</span><span>${new Date(task.started_at).toLocaleString()}</span></div>`;
          if (task.completed_at) html += `<div style="display:grid; grid-template-columns:120px 1fr; gap:8px;"><span style="color:var(--muted);">完成时间:</span><span>${new Date(task.completed_at).toLocaleString()}</span></div>`;
          if (task.params) {
            html += '<div style="margin-top:8px; padding-top:12px; border-top:1px solid var(--border);"><div style="font-weight:600; margin-bottom:8px;">任务参数</div>';
            if (task.params.text) html += `<div style="margin-bottom:8px;"><div style="color:var(--muted);font-size:11px;">合成文本:</div><div style="background:#1f2635;padding:8px;border-radius:4px;margin-top:4px;font-size:12px;">${task.params.text}</div></div>`;
            if (task.params.ref_text && task.params.ref_text !== '[已隐藏]') html += `<div style="margin-bottom:8px;"><div style="color:var(--muted);font-size:11px;">参考文本:</div><div style="background:#1f2635;padding:8px;border-radius:4px;margin-top:4px;font-size:12px;">${task.params.ref_text}</div></div>`;
            html += `<div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-top:8px;"><div><div style="color:var(--muted);font-size:11px;">语速:</div><div style="font-weight:600;">${task.params.speed || 1.0}</div></div><div><div style="color:var(--muted);font-size:11px;">语言:</div><div style="font-weight:600;">${task.params.lang || 'English'}</div></div><div><div style="color:var(--muted);font-size:11px;">模型:</div><div style="font-weight:600;">${task.params.model || '1.7B'}</div></div></div></div>`;
          }
          let subtitleMountId = null;
          if (task.status === 'completed' && task.audio_url) {
            const audioUrl = fullUrl(task.audio_url);
            const subtitleSrtUrl = task.subtitle_srt ? fullUrl(task.subtitle_srt) : '';
            const subtitleJsonUrl = task.subtitle_json ? fullUrl(task.subtitle_json) : '';
            subtitleMountId = createMountId("task-detail-subtitle");
            html += `<div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border);"><div style="font-weight:600; margin-bottom:6px;">🎧 试听</div><audio id="${subtitleMountId}-audio" controls src="${audioUrl}" style="width:100%; margin-bottom:10px;"></audio><div style="display:flex; gap:8px; flex-wrap:wrap;"><a href="${audioUrl}" download style="display:inline-block; padding:10px 20px; background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#0b0f1a; text-decoration:none; border-radius:8px; font-weight:600;">🎵 下载</a>${subtitleSrtUrl ? `<a href="${subtitleSrtUrl}" download class="icon-btn">下载 SRT</a>` : ''}${subtitleJsonUrl ? `<a href="${subtitleJsonUrl}" download class="icon-btn">下载 JSON</a>` : ''}<button type="button" class="icon-btn" onclick="deleteTaskThenRefresh('${task.user_id}','${task.task_id}','pageTasks')">删除任务</button><button type="button" class="icon-btn" onclick="retryTaskThenRefresh('${task.user_id}','${task.task_id}')">重试</button></div><div style="margin-top:8px; font-size:11px; color:var(--muted);">采样率: ${task.sample_rate || 24000} Hz</div>${buildSubtitleWidgetMarkup(subtitleMountId, { subtitleSrtUrl, subtitleSrtName: `${task.task_id}.srt`, subtitleJsonUrl, subtitleJsonName: `${task.task_id}_subtitle.json`, subtitleError: task.subtitle_error || "" })}</div>`;
          }
          if (task.status === 'failed') html += `<div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border); display:flex; gap:8px;"><button type="button" class="icon-btn" onclick="deleteTaskThenRefresh('${task.user_id}','${task.task_id}','pageTasks')">删除任务</button><button type="button" class="icon-btn" onclick="retryTaskThenRefresh('${task.user_id}','${task.task_id}')">重试</button></div>`;
          if (task.error) html += `<div style="margin-top:12px; padding:12px; background:#3d1a1a; border-left:3px solid #ff6b6b; border-radius:4px;"><div style="color:#ff6b6b; font-weight:600; margin-bottom:4px;">错误信息</div><div style="color:#ffb3b3; font-size:12px;">${task.error}</div></div>`;
          html += '</div>';
          detailContent.innerHTML = html;
          if (subtitleMountId) {
            mountSubtitleWidget({
              mountId: subtitleMountId,
              audioElementId: `${subtitleMountId}-audio`,
              subtitleJsonUrl: task.subtitle_json || null,
            });
          }
        } catch (err) {
          detailContent.innerHTML = `<div style="color:#ff6b6b;">加载失败: ${String(err)}</div>`;
        }
      }
    </script>
  </body>
</html>
